name: Build and Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # 用于上传扫描结果到 GitHub Security 标签页

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 前置代码/文件检查
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      # 2. 环境准备
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 提取元数据
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/demo-app
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=long

      # 4. 构建本地镜像（不推送）
      # 这里为了 Trivy 能扫到，我们先 load 到本地 Docker 守护进程
      - name: Build local image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true 
          tags: local-check-image:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. 安全扫描拦截 (镜像层)
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-check-image:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # 发现漏洞则中断
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 6. 只有扫描通过才登录并推送
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push verified image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 重新使用之前的 GHA 缓存，推送会非常快
          cache-from: type=gha
          cache-to: type=gha,mode=max